[workspace]
name = "vllm-inference"
channels = ["conda-forge"]
platforms = ["linux-64"]
version = "0.1.0"

# ---------------------------------------------------------------------------
# Dependencies — all from conda-forge
# ---------------------------------------------------------------------------
#
# This replaces the vLLM Docker image (vllm/vllm-openai:latest) with a pixi
# environment. Everything the Docker image provides — CUDA, PyTorch, NCCL,
# vLLM itself — comes from conda-forge packages instead.
#
# The only thing that must be on the host is the NVIDIA driver (check with
# nvidia-smi). The CUDA toolkit, cuDNN, NCCL, etc. are all managed by pixi.
#
# conda-forge vllm (0.10.x) lags behind PyPI (0.16.x). If you need the
# latest vLLM, replace [dependencies] with:
#
#   [dependencies]
#   python = "3.12.*"
#
#   [pypi-dependencies]
#   vllm = ">=0.16"
#
# The PyPI wheel bundles its own CUDA/PyTorch, so no other deps are needed.
# ---------------------------------------------------------------------------

[dependencies]
python = "3.12.*"
vllm = ">=0.10"

# ---------------------------------------------------------------------------
# Tasks — replicate what the vLLM Docker entrypoint does
# ---------------------------------------------------------------------------
[tasks]

# Serve a model with the OpenAI-compatible API (the core use case).
# All flags are configurable via environment variables — see serve.py.
#
# Quick start (small model, ~1 GB download):
#   MODEL=Qwen/Qwen2.5-0.5B-Instruct pixi run serve
#
# Qwen3-Coder-Next on qgpu2 (2x TITAN RTX, tensor parallel):
#   MODEL=Qwen/Qwen3-Coder-Next \
#   TENSOR_PARALLEL_SIZE=2 \
#   MAX_MODEL_LEN=32768 \
#   pixi run serve
#
# Qwen3-Coder-Next on RunPod (2x RTX PRO 6000, full context):
#   MODEL=Qwen/Qwen3-Coder-Next \
#   TENSOR_PARALLEL_SIZE=2 \
#   MAX_MODEL_LEN=131072 \
#   GPU_MEMORY_UTILIZATION=0.95 \
#   pixi run serve
serve = "python scripts/serve.py"

# Serve a GGUF model. vLLM supports two ways to specify GGUF models:
#
#   1. HuggingFace GGUF spec (preferred — vLLM downloads the right file):
#      MODEL="unsloth/Qwen3-0.6B-GGUF:Q4_K_M" \
#      TOKENIZER=Qwen/Qwen3-0.6B \
#      pixi run serve-gguf
#
#   2. Local GGUF file path:
#      MODEL=/path/to/model.gguf \
#      TOKENIZER=Qwen/Qwen3-Coder-Next \
#      pixi run serve-gguf
#
# Note: vLLM's GGUF support is experimental and under-optimized — it
# dequantizes weights every forward pass via its own CUDA kernels (it does
# NOT use llama.cpp internally). For best vLLM throughput, prefer AWQ/GPTQ
# quantizations. GGUF is included here because it's the most common
# quantization format on HuggingFace.
#
# Important: always set TOKENIZER to the base model (not the GGUF repo),
# because vLLM's GGUF tokenizer extraction is unreliable.
serve-gguf = "QUANTIZATION=gguf python scripts/serve.py"

# Quick smoke test: start serving a tiny model (~1 GB).
test-serve = "MODEL=Qwen/Qwen2.5-0.5B-Instruct MAX_MODEL_LEN=2048 python scripts/serve.py"

# Send a test chat completion to a running server.
test-chat = "python scripts/test_chat.py"
